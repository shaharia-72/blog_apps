services:
  web:
    build: .
    # Production: use Gunicorn (from Dockerfile CMD), not runserver
    # Override with 'command: python manage.py runserver 0.0.0.0:8000' for dev 
    volumes:
      - .:/app
      - static-files:/app/staticfiles
      - media-files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery:
    build: .
    command: >
      celery -A config worker
      -l info
      --concurrency=2
      -Q default,email,analytics
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    command: >
      celery -A config beat
      -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  static-files:
  media-files:
