version: "3.9"

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
    image: blogapps-celery:latest
    restart: unless-stopped
    depends_on:
      - redis
    working_dir: /app
    volumes:
      - .:/app:ro
    env_file:
      - .env
    command: ["celery", "-A", "${CELERY_APP}", "worker", "-l", "info", "--concurrency=1"]

volumes:
  redis-data:
